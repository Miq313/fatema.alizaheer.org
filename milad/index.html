<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On the Path of Light</title>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/milad.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">
</head>

<body>
    <div class="header">
        <span class="header-bismillah" role="img" aria-label="Bismillah"></span><br>
        <h1>R S V P</h1>
        <h2>Mīlād | September 5, 2026</h2>
    </div>
    

    <!-- RSVP Form -->
    <form id="rsvp-form">

        <!-- Name Inputs -->
        <div class="name-inputs">
            <input type="text" name="first_name" placeholder="First Name" required>
            <input type="text" name="last_name" placeholder="Last Name" required>
        </div>

        <!-- Email Input -->
        <input type="email" name="email" placeholder="Email Address" required>

        <div class="attendance-options">
            <label>
                <input type="radio" name="attendance" value="yes" required>
                Accepts with pleasure
            </label>
            <label>
                <input type="radio" name="attendance" value="no" required>
                Declines with regret
            </label>
        </div>

        <!-- Counter for Women and Kids (U10) -->
        <div class="counter-inputs" id="counterSection">
            <div class="counter-label">
                <label for="women">Women</label>
            </div>
            <div class="counter">
                <button type="button" onclick="updateCount('women', -1)">-</button>
                <input type="hidden" name="women_count" id="women_input" value="0">
                <span id="women" data-count="0">0</span>
                <button type="button" onclick="updateCount('women', 1)">+</button>
            </div>
            <div class="counter-label">
                <label for="kids">Kids (Under 10)</label>
            </div>
            <div class="counter">
                <button type="button" onclick="updateCount('kids', -1)">-</button>
                <input type="hidden" name="kids_count" id="kids_input" value="0">
                <span id="kids" data-count="0">0</span>
                <button type="button" onclick="updateCount('kids', 1)">+</button>
            </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submit-btn">RSVP</button>
    </form>

    <div class="footer">
        <span class="footer-logo" role="img" aria-label="Dove"></span>
    </div>

    <!-- JavaScript for Counters -->
    <script>
        function updateCount(gender, change) {
            const counter = document.getElementById(gender);
            const input = document.getElementById(`${gender}_input`);
            let currentCount = parseInt(counter.getAttribute('data-count'));
            currentCount += change;
            if (currentCount < 0) currentCount = 0;
            counter.textContent = currentCount;
            counter.setAttribute('data-count', currentCount);
            input.value = currentCount;
        }

        const attendanceRadios = document.querySelectorAll('input[name="attendance"]');
        const counterSection = document.getElementById('counterSection');

        counterSection.classList.remove('show');

        attendanceRadios.forEach(radio => {
            radio.addEventListener('change', () => {
            if (radio.value === 'yes') {
                counterSection.classList.add('show');
            } else {
                counterSection.classList.remove('show');
            }
            });
        });

    </script>
    <script>
        window.addEventListener('load', function() {
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.classList.remove('loading');
            submitBtn.disabled = false;
        });

        const form = document.getElementById('rsvp-form');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async function (e) {
        e.preventDefault();

        const selected = document.querySelector('input[name="attendance"]:checked');
        if (selected && selected.value === 'yes') {
            const women = parseInt(document.getElementById('women_input').value);
            const kids = parseInt(document.getElementById('kids_input').value);
            if ((women + kids) === 0) {
            alert('Please indicate how many guests will be attending.');
            return;
            }
        }

        submitBtn.disabled = true;
        submitBtn.classList.add('loading');

        const formData = new FormData(form);

        try {
            const response = await fetch(
            'https://script.google.com/macros/s/AKfycbwpo7WffaM9SDVsS_o8VIhtcX-AU8QqdiXmv975RDBX-BmeB3wuekRjufFo3kvBGBRzLQ/exec',
            {
                method: 'POST',
                body: formData
            }
            );

            if (response.ok) {
            window.location.href = '/milad/jazakallah.html';
            } else {
            throw new Error('Submission failed');
            }
        } catch (error) {
            alert('Something went wrong. Please try again.');
            submitBtn.disabled = false;
            submitBtn.classList.remove('loading');
            submitBtn.textContent = 'RSVP';
        }
        });

      </script>      

</body>
</html>
