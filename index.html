<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under the Hand of Wilāyah</title>
    <link rel="stylesheet" href="/styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">
</head>

<body>
    <div class="header">
        <img src="/assets/bismillah.svg" alt="Bismillah" class="header-bismillah"><br>
        <h1>R S V P</h1>
        <h2>Nikāh | September 7, 2026</h2>
    </div>
    

    <!-- RSVP Form -->
    <form id="rsvp-form">

        <!-- Name Inputs -->
        <div class="name-inputs">
            <input type="text" name="first_name" placeholder="First Name" required>
            <input type="text" name="last_name" placeholder="Last Name" required>
        </div>

        <!-- Email Input -->
        <input type="email" name="email" placeholder="Email Address" required>

        <div class="attendance-options">
            <label>
                <input type="radio" name="attendance" value="yes" required>
                Accepts with pleasure
            </label>
            <label>
                <input type="radio" name="attendance" value="no" required>
                Declines with wishes
            </label>
        </div>

        <!-- Counter for Men and Women -->
        <div class="counter-inputs" id="counterSection">
            <div class="counter-label">
                <label for="men">Men</label>
            </div>
            <div class="counter">
                <button type="button" onclick="updateCount('men', -1)">-</button>
                <input type="hidden" name="men_count" id="men_input" value="0">
                <span id="men" data-count="0">0</span>
                <button type="button" onclick="updateCount('men', 1)">+</button>
            </div>
            <div class="counter-label">
                <label for="women">Women</label>
            </div>
            <div class="counter">
                <button type="button" onclick="updateCount('women', -1)">-</button>
                <input type="hidden" name="women_count" id="women_input" value="0">
                <span id="women" data-count="0">0</span>
                <button type="button" onclick="updateCount('women', 1)">+</button>
            </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submit-btn">
            <span class="submit-btn__label">RSVP</span>
            <span class="submit-btn__spinner" aria-hidden="true"></span>
        </button>
    </form>

    <div class="footer">
        <img src="/assets/dove.svg" alt="Dove" class="footer-logo">
    </div>

    <!-- JavaScript for Counters -->
    <script>
        function updateCount(gender, change) {
            const counter = document.getElementById(gender);
            const input = document.getElementById(`${gender}_input`);
            let currentCount = parseInt(counter.getAttribute('data-count'));
            currentCount += change;
            if (currentCount < 0) currentCount = 0;
            counter.textContent = currentCount;
            counter.setAttribute('data-count', currentCount);
            input.value = currentCount; // sync with hidden input
        }

        const attendanceRadios = document.querySelectorAll('input[name="attendance"]');
        const counterSection = document.getElementById('counterSection');

        // Ensure it's hidden initially (via class)
        counterSection.classList.remove('show');

        attendanceRadios.forEach(radio => {
            radio.addEventListener('change', () => {
            if (radio.value === 'yes') {
                counterSection.classList.add('show');
            } else {
                counterSection.classList.remove('show');
            }
            });
        });

    </script>
    <script>
        window.addEventListener('load', function() {
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.classList.remove('loading');  // Removes the loading class when the page is reloaded
            submitBtn.disabled = false;  // Re-enable the button in case it's been disabled
        });

        const form = document.getElementById('rsvp-form');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async function (e) {
        e.preventDefault();

        // Check guest count if attending
        const selected = document.querySelector('input[name="attendance"]:checked');
        if (selected && selected.value === 'yes') {
            const men = parseInt(document.getElementById('men_input').value);
            const women = parseInt(document.getElementById('women_input').value);
            if ((men + women) === 0) {
            alert('Please indicate how many guests will be attending.');
            return;
            }
        }

        // Show loading state
        submitBtn.disabled = true;
        submitBtn.classList.add('loading');

        const formData = new FormData(form);

        try {
            const response = await fetch(
            'https://script.google.com/macros/s/AKfycbx-9VmbYApOcMzQ6ZkmohVkxiKizJQz9fPAwidQHXgXOYH7Qd02sWQ1LC-cLTRPEueaLA/exec',
            {
                method: 'POST',
                body: formData
            }
            );

            if (response.ok) {
            window.location.href = '/jazakallah.html';
            } else {
            throw new Error('Submission failed');
            }
        } catch (error) {
            alert('Something went wrong. Please try again.');
            submitBtn.disabled = false;
            submitBtn.classList.remove('loading');
            submitBtn.querySelector('.submit-btn__label').textContent = 'RSVP';
        }
        });

      </script>      

</body>
</html>
